<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucknow Wedding Studio | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --ios-blur: blur(25px);
            --liquid-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ffffff;
            overflow: hidden; 
        }

        /* --- Liquid Glass UI --- */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4),
                        inset 0 0 10px rgba(255, 255, 255, 0.05);
            transition: all 0.5s var(--liquid-bezier);
        }

        /* --- Animations --- */
        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes bgPan {
            0% { transform: scale(1.1); }
            100% { transform: scale(1.2) translateX(-10px); }
        }

        .animate-item {
            opacity: 0;
            animation: floatIn 0.8s var(--liquid-bezier) forwards;
        }

        /* --- Background --- */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            animation: bgPan 20s infinite alternate ease-in-out;
            filter: brightness(0.5);
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* --- Interaction --- */
        .ios-btn:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
        }

        .ios-btn:active {
            transform: scale(0.96);
            filter: brightness(0.8);
        }

        /* Scrollbar adjustment for smaller viewports */
        @media (max-height: 800px) {
            body { overflow-y: auto; }
            .min-h-screen { min-height: auto; padding-top: 2rem; padding-bottom: 2rem; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-container">
        <div class="bg-image"></div>
    </div>
    <div class="overlay"></div>

    <div class="w-full max-w-md relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-6 animate-item" style="animation-delay: 0.1s;">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-2 tracking-tighter drop-shadow-lg">
                Lucknow Wedding Studio
            </h1>
            <p class="text-white/70 text-base font-medium italic">
                Capturing Your Royal Moments
            </p>
        </div>

        <!-- Dashboard Links -->
        <div class="space-y-3">

            <!-- Portfolio -->
            <a href="https://lucknoweddingstudio.github.io/lws/portfolio/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.2s;">
                <div class="bg-gradient-to-br from-rose-500 to-rose-700 w-12 h-12 flex items-center justify-center rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <span class="text-white font-black text-sm tracking-tighter">LWS</span>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Portfolio</h2>
                    <p class="text-white/50 text-xs font-medium">Our signature films</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>
            
            <!-- Finance -->
            <a href="https://lucknoweddingstudio.github.io/lws/portal/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.3s;">
                <div class="bg-gradient-to-br from-blue-500 to-blue-700 p-3 rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <i data-lucide="wallet" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Finance</h2>
                    <p class="text-white/50 text-xs font-medium">Invoices & payments</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Quotation -->
            <a href="https://lucknoweddingstudio.github.io/lws/calculator/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.4s;">
                <div class="bg-gradient-to-br from-amber-500 to-amber-700 p-3 rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <i data-lucide="calculator" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Quotation</h2>
                    <p class="text-white/50 text-xs font-medium">Instant event estimates</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Team Availability -->
            <a href="https://lucknoweddingstudio.github.io/lws/calender/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.5s;">
                <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 p-3 rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <i data-lucide="calendar-days" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Availability</h2>
                    <p class="text-white/50 text-xs font-medium">Shooting schedule</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Payment -->
            <a href="https://lucknoweddingstudio.github.io/lws/payment/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.6s;">
                <div class="bg-gradient-to-br from-indigo-500 to-indigo-700 p-3 rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <i data-lucide="indian-rupee" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Payment</h2>
                    <p class="text-white/50 text-xs font-medium">Secure booking payments</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

            <!-- Invoice (NEW SECTION) -->
            <a href="https://lucknoweddingstudio.github.io/lws/Invoice/" 
               class="liquid-glass ios-btn flex items-center p-4 rounded-[1.8rem] group no-underline animate-item" style="animation-delay: 0.7s;">
                <div class="bg-gradient-to-br from-purple-500 to-purple-700 p-3 rounded-xl mr-4 shadow-lg group-hover:rotate-3 transition-transform">
                    <i data-lucide="file-text" class="text-white w-6 h-6"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-white">Invoice</h2>
                    <p class="text-white/50 text-xs font-medium">Generate new invoice</p>
                </div>
                <i data-lucide="chevron-right" class="text-white/30 group-hover:translate-x-1 transition-transform"></i>
            </a>

        </div>

        <!-- Controls -->
        <div class="mt-6 flex justify-center items-center animate-item" style="animation-delay: 0.9s;">
            <button onclick="copyCurrentURL()" class="liquid-glass p-4 rounded-full ios-btn">
                <i data-lucide="share-2" class="text-white w-6 h-6"></i>
            </button>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 animate-item" style="animation-delay: 1.1s;">
            <p class="text-white/30 text-[9px] font-black tracking-[0.4em] uppercase">
                LWS HUB &copy; 2026
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function copyCurrentURL() {
            const textToCopy = window.location.href;
            const temp = document.createElement('input');
            document.body.appendChild(temp);
            temp.value = textToCopy;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            // Minimalist feedback could be added here if needed
        }

        setTimeout(() => {
            if (window.innerHeight > 800) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }, 1500);
    </script>
</body>
</html>

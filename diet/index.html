<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diet & Calorie Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --blue:#0A84FF; --green:#30D158; --orange:#FF9F0A; --red:#FF453A; --purple:#BF5AF2;
  --ink:#1C1C1E; --ink-soft:#6E6E73;
  --glass-bg: rgba(255,255,255,0.55);
  --glass-bg-strong: rgba(255,255,255,0.75);
  --glass-border: rgba(255,255,255,0.65);
  --page-bg-1:#EAF2FF; --page-bg-2:#F6F0FF; --page-bg-3:#FFFFFF;
  --shadow: 0 8px 32px rgba(31,38,68,.10);
  --shadow-lift: 0 16px 40px rgba(31,38,68,.16);
}
[data-theme="dark"]{
  --ink:#F2F2F7; --ink-soft:#9A9AA2;
  --glass-bg: rgba(30,30,36,0.55);
  --glass-bg-strong: rgba(34,34,40,0.72);
  --glass-border: rgba(255,255,255,0.10);
  --page-bg-1:#0B0B10; --page-bg-2:#121018; --page-bg-3:#0D0D12;
  --shadow: 0 8px 32px rgba(0,0,0,.45);
  --shadow-lift: 0 20px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:'Inter',sans-serif; color:var(--ink);
  background:
    radial-gradient(700px 500px at 8% -5%, color-mix(in srgb, var(--blue) 22%, transparent), transparent 60%),
    radial-gradient(600px 500px at 100% 0%, color-mix(in srgb, var(--purple) 20%, transparent), transparent 60%),
    linear-gradient(180deg, var(--page-bg-1), var(--page-bg-2) 45%, var(--page-bg-3));
  min-height:100%;
  padding-bottom:150px;
  transition:background .3s;
}
.blob{position:fixed; border-radius:50%; filter:blur(70px); z-index:-1; opacity:.5;}
.blob1{width:340px; height:340px; background:var(--blue); top:-100px; left:-100px;}
.blob2{width:300px; height:300px; background:var(--green); bottom:10%; right:-80px;}
.blob3{width:260px; height:260px; background:var(--orange); top:40%; left:45%; opacity:.25;}

.glass{
  background:var(--glass-bg);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border:1px solid var(--glass-border);
  border-radius:24px;
  box-shadow:var(--shadow);
  transition: transform .25s ease, box-shadow .25s ease, background .3s;
}
.glass:hover{ box-shadow:var(--shadow-lift); }

/* ---- Nav ---- */
nav.floatnav{
  position:sticky; top:14px; z-index:50; margin:14px auto 22px; max-width:1180px;
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 18px; border-radius:22px;
}
.nav-inner{display:flex; align-items:center; gap:14px; width:100%; flex-wrap:wrap;}
.logo{font-weight:800; font-size:17px; display:flex; align-items:center; gap:8px;}
.logo .dot{width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--purple));}
.nav-cal{font-size:13px; color:var(--ink-soft); font-weight:600; padding:6px 12px; border-radius:14px; background:var(--glass-bg-strong); border:1px solid var(--glass-border);}
.nav-cal b{color:var(--ink);}
.nav-spacer{flex:1;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--glass-border);
  background:var(--glass-bg-strong); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:transform .15s;
}
.icon-btn:hover{ transform:translateY(-2px) scale(1.05); }
.icon-btn:active{ transform:scale(.92); }

.wrap{max-width:1180px; margin:0 auto; padding:0 16px;}
.hero{padding:8px 4px 26px;}
.hero h1{font-size:30px; font-weight:800; margin:0 0 6px; letter-spacing:-.02em;}
.hero p{color:var(--ink-soft); font-size:14px; margin:0; max-width:560px;}

/* ---- Profile panel ---- */
.profile-card{padding:18px 20px; margin-bottom:22px;}
.profile-card summary{cursor:pointer; font-weight:700; font-size:14px; list-style:none; display:flex; align-items:center; gap:8px;}
.profile-card summary::-webkit-details-marker{display:none;}
.profile-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-top:16px;}
@media(max-width:900px){.profile-grid{grid-template-columns:repeat(2,1fr);}}
.profile-grid label{font-size:11px; color:var(--ink-soft); display:block; margin-bottom:4px; font-weight:600;}
.profile-grid input,.profile-grid select{
  width:100%; padding:8px 10px; border-radius:12px; border:1px solid var(--glass-border);
  background:var(--glass-bg-strong); color:var(--ink); font-size:13px; font-family:inherit;
}

/* ---- Ring dashboard ---- */
.rings{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px;}
@media(max-width:760px){.rings{grid-template-columns:repeat(2,1fr);}}
.ring-card{padding:16px; display:flex; flex-direction:column; align-items:center; gap:8px; animation:fadeUp .5s ease both;}
.ring-card svg{transform:rotate(-90deg); overflow:visible;}
.ring-card .ringval{position:relative; margin-top:-92px; font-size:13px; font-weight:700; text-align:center; width:92px;}
.ring-card .ringval small{display:block; font-weight:500; color:var(--ink-soft); font-size:10px; margin-top:2px;}
.ring-card .track{stroke:var(--glass-border); fill:none; stroke-width:8;}
.ring-card .fill{fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1);}
.ring-card .lbl{font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;}

/* ---- Meal cards ---- */
.meals{display:grid; grid-template-columns:repeat(2,1fr); gap:16px;}
@media(max-width:760px){.meals{grid-template-columns:1fr;}}
.meal-card{padding:18px 20px; animation:fadeUp .5s ease both;}
.meal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.meal-title{display:flex; align-items:center; gap:10px; font-weight:700; font-size:16px;}
.meal-title .emoji{font-size:20px;}
.meal-kcal{font-size:13px; font-weight:700; color:var(--blue); background:color-mix(in srgb, var(--blue) 14%, transparent); padding:4px 10px; border-radius:12px;}

.search-wrap{position:relative; margin-bottom:12px;}
.search-wrap input{
  width:100%; padding:11px 14px 11px 36px; border-radius:16px; border:1px solid var(--glass-border);
  background:var(--glass-bg-strong); color:var(--ink); font-size:13px; font-family:inherit;
}
.search-wrap .sicon{position:absolute; left:12px; top:11px; font-size:14px; opacity:.6;}
.dropdown{
  position:absolute; top:44px; left:0; right:0; z-index:30; max-height:230px; overflow-y:auto;
  border-radius:16px; padding:6px; background:var(--glass-bg-strong); backdrop-filter:blur(20px);
  border:1px solid var(--glass-border); box-shadow:var(--shadow-lift);
}
.dropdown .opt{padding:9px 10px; border-radius:10px; cursor:pointer; font-size:13px; display:flex; justify-content:space-between; gap:8px;}
.dropdown .opt:hover{background:color-mix(in srgb, var(--blue) 12%, transparent);}
.dropdown .empty{padding:10px; font-size:12px; color:var(--ink-soft);}

.pills{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
.pill{
  display:flex; align-items:center; gap:8px; padding:7px 8px 7px 12px; border-radius:18px;
  background:var(--glass-bg-strong); border:1px solid var(--glass-border); font-size:12px;
  animation:pillIn .25s ease both;
}
.pill .pname{font-weight:600;}
.pill .pmeta{color:var(--ink-soft); font-size:11px;}
.pill input[type=number]{
  width:44px; border:none; background:transparent; text-align:center; font-size:12px; color:var(--ink); font-family:inherit;
}
.pill .kc{font-weight:700; color:var(--blue); font-size:11px;}
.pill .x{border:none; background:none; cursor:pointer; color:var(--red); font-size:14px; line-height:1;}

.subtotal-row{display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--ink-soft); margin:6px 0 12px;}
.subtotal-row b{color:var(--ink);}

.custom-add{display:flex; gap:6px; margin-bottom:10px;}
.custom-add input{
  flex:1; padding:8px 10px; border-radius:12px; border:1px dashed var(--glass-border);
  background:transparent; color:var(--ink); font-size:12px; font-family:inherit;
}
.glass-btn{
  border:1px solid var(--glass-border); background:var(--glass-bg-strong); color:var(--ink);
  padding:8px 14px; border-radius:14px; font-size:12px; font-weight:700; cursor:pointer;
  position:relative; overflow:hidden; transition:transform .15s;
}
.glass-btn:hover{transform:translateY(-2px);}
.glass-btn:active{transform:scale(.95);}
.glass-btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; border:none;}
.glass-btn.danger{color:var(--red);}
.meal-foot{display:flex; justify-content:space-between; align-items:center;}

/* ---- Suggestions ---- */
.suggest-card{padding:18px 20px; margin-top:20px;}
.suggest-card h3{margin:0 0 10px; font-size:15px;}
.suggest-card ul{margin:0; padding-left:18px; font-size:13px; color:var(--ink-soft); line-height:1.8;}
.suggest-card .ok{color:var(--green); font-size:13px; font-weight:600;}

/* ---- Sticky bottom ---- */
.sticky-bar{position:fixed; bottom:14px; left:0; right:0; z-index:60; display:flex; justify-content:center; padding:0 16px;}
.sticky-inner{
  max-width:960px; width:100%; display:flex; align-items:center; gap:18px; padding:12px 20px; border-radius:24px;
  overflow-x:auto;
}
.mac-mini{display:flex; flex-direction:column; gap:4px; min-width:90px;}
.mac-mini .top{display:flex; justify-content:space-between; font-size:10px; color:var(--ink-soft); font-weight:700; text-transform:uppercase;}
.mac-mini .track{height:5px; border-radius:4px; background:var(--glass-border); overflow:hidden;}
.mac-mini .fill{height:100%; border-radius:4px; transition:width .4s;}

/* ---- toast ---- */
.toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(10px); z-index:70;
  padding:10px 18px; border-radius:20px; font-size:12px; display:flex; gap:12px; align-items:center;
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
  background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.toast button{background:none; border:none; color:#fff; text-decoration:underline; cursor:pointer; font-size:12px; font-weight:700;}

@keyframes fadeUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
@keyframes pillIn{ from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);} }

@media (prefers-reduced-motion: reduce){
  *{animation:none !important; transition:none !important;}
}
</style>
</head>

["Rasgulla","Desserts","🍰","1 pc",106,4,22,0.5,0],
["Jalebi","Desserts","🍰","50g",150,1,25,5,0],
["Kheer","Desserts","🍰","bowl",250,6,35,9,0.5],
["Ice Cream","Desserts","🍰","1 scoop",137,2.3,16,7.3,0.5],
["Chocolate","Desserts","🍰","25g",135,1.5,15,8,1],
["Cake","Desserts","🍰","1 slice",235,3,35,9,0.5],
];
const FOODS = DB.map((r,i)=>({id:"f"+i, name:r[0], cat:r[1], icon:r[2], unit:r[3], k:r[4], p:r[5], c:r[6], f:r[7], fb:r[8]}));
function byName(n){ return FOODS.find(f=>f.name===n); }

/* ---------- Default meal plan (separate config, references DB by id) ---------- */
const DEFAULT_MEAL_PLAN = {
  breakfast: [
    {foodId: byName("Tea with Sugar").id, qty:1},
    {foodId: byName("Paneer").id, qty:1},
  ],
  lunch: [
    {foodId: byName("Chapati").id, qty:3},
    {foodId: byName("Cucumber").id, qty:2},
    {foodId: byName("Mix Vegetable").id, qty:1},
    {foodId: byName("White Rice (cooked)").id, qty:1},
  ],
  evening: [
    {foodId: byName("Tea with Sugar").id, qty:1},
    {foodId: byName("Peanuts").id, qty:1},
  ],
  dinner: [
    {foodId: byName("Chapati").id, qty:3},
    {foodId: byName("Dal (cooked)").id, qty:1},
  ],
};
const MEAL_META = [
  {key:"breakfast", label:"Breakfast", emoji:"🍳"},
  {key:"lunch", label:"Lunch", emoji:"🍛"},
  {key:"evening", label:"Evening", emoji:"☕"},
  {key:"dinner", label:"Dinner", emoji:"🌙"},
];
function freshMeals(){
  return MEAL_META.map(m=>({...m, items: DEFAULT_MEAL_PLAN[m.key].map(i=>({...i}))}));
}
let MEALS = freshMeals();
function foodOf(item){ return FOODS.find(f=>f.id===item.foodId); }

let lastRemoved = null;

/* ---------- Profile / target ---------- */
function computeTarget(){
  const h = +document.getElementById("p_height").value;
  const w = +document.getElementById("p_weight").value;
  const a = +document.getElementById("p_age").value;
  const sex = document.getElementById("p_sex").value;
  const act = +document.getElementById("p_activity").value;
  const rate = +document.getElementById("p_rate").value;
  const bmr = sex==="male" ? (10*w+6.25*h-5*a+5) : (10*w+6.25*h-5*a-161);
  const tdee = bmr*act;
  const target = Math.round(tdee - rate*1100);
  return {target, weight:w};
}

/* ---------- Rendering ---------- */
function renderMeals(){
  const wrap = document.getElementById("mealsWrap");
  wrap.innerHTML = "";
  MEALS.forEach((meal, mi)=>{
    const sub = subtotal(meal.items);
    const card = document.createElement("div");
    card.className = "meal-card glass";
    card.style.animationDelay = (mi*0.06)+"s";
    card.innerHTML = `
      <div class="meal-head">
        <div class="meal-title"><span class="emoji">${meal.emoji}</span>${meal.label}</div>
        <span class="meal-kcal">${Math.round(sub.k)} kcal</span>
      </div>
      <div class="search-wrap">
        <span class="sicon">🔍</span>
        <input type="text" placeholder="Search food… (Pan, Ric, App)" data-meal="${meal.key}" class="searchInput" autocomplete="off">
        <div class="dropdown" style="display:none;" data-meal="${meal.key}"></div>
      </div>
      <div class="pills" data-meal="${meal.key}"></div>
      <div class="subtotal-row">
        <span>P <b>${sub.p.toFixed(1)}g</b></span><span>C <b>${sub.c.toFixed(1)}g</b></span><span>F <b>${sub.f.toFixed(1)}g</b></span><span>Fib <b>${sub.fb.toFixed(1)}g</b></span>
      </div>
      <div class="custom-add">
        <input type="text" placeholder="Custom food name" data-meal="${meal.key}" class="customName">
        <input type="number" placeholder="kcal" style="width:56px;flex:none" data-meal="${meal.key}" class="customKcal">
        <button class="glass-btn" data-meal="${meal.key}" data-role="customAdd">Add</button>
      </div>
      <div class="meal-foot">
        <button class="glass-btn danger" data-meal="${meal.key}" data-role="clear">Clear meal</button>
      </div>
    `;
    wrap.appendChild(card);

    const pillsWrap = card.querySelector(".pills");
    meal.items.forEach((item, idx)=>{
      const f = item.custom ? item : foodOf(item);
      const k = f.k*item.qty;
      const pill = document.createElement("div");
      pill.className = "pill";
      pill.innerHTML = `
        <span>${f.icon||"🍽️"}</span>
        <span class="pname">${f.name}</span>
        <input type="number" min="0" step="0.25" value="${item.qty}" data-meal="${meal.key}" data-idx="${idx}" class="qtyIn">
        <span class="kc">${Math.round(k)}k</span>
        <button class="x" data-meal="${meal.key}" data-idx="${idx}">×</button>
      `;
      pillsWrap.appendChild(pill);
    });
  });

  document.querySelectorAll(".qtyIn").forEach(inp=>{
    inp.addEventListener("change", e=>{
      const meal = MEALS.find(m=>m.key===e.target.dataset.meal);
      meal.items[+e.target.dataset.idx].qty = parseFloat(e.target.value)||0;
      renderAll();
    });
  });
  document.querySelectorAll(".pill .x").forEach(btn=>{
    btn.addEventListener("click", e=>{
      const meal = MEALS.find(m=>m.key===e.target.dataset.meal);
      const idx = +e.target.dataset.idx;
      lastRemoved = {mealKey:meal.key, item:meal.items[idx], index:idx};
      meal.items.splice(idx,1);
      showToast(`Removed ${lastRemoved.item.custom?lastRemoved.item.name:foodOf(lastRemoved.item).name}`);
      renderAll();
    });
  });
  document.querySelectorAll('[data-role="clear"]').forEach(btn=>{
    btn.addEventListener("click", e=>{
      const meal = MEALS.find(m=>m.key===e.target.dataset.meal);
      meal.items = [];
      renderAll();
    });
  });
  document.querySelectorAll(".searchInput").forEach(inp=>{
    inp.addEventListener("input", e=>{
      const mk = e.target.dataset.meal;
      const dd = document.querySelector(`.dropdown[data-meal="${mk}"]`);
      const q = e.target.value.trim().toLowerCase();
      if(!q){ dd.style.display="none"; return; }
      const matches = FOODS.filter(f=>f.name.toLowerCase().includes(q)).slice(0,10);
      dd.innerHTML = matches.length
        ? matches.map(f=>`<div class="opt" data-meal="${mk}" data-food="${f.id}"><span>${f.icon} ${f.name}</span><span style="color:var(--ink-soft);font-size:11px">${f.k} kcal/${f.unit}</span></div>`).join("")
        : `<div class="empty">No matches — use "Custom food" below.</div>`;
      dd.style.display = "block";
    });
    inp.addEventListener("blur", ()=> setTimeout(()=>{document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");}, 150));
  });
  document.querySelectorAll(".dropdown").forEach(dd=>{
    dd.addEventListener("mousedown", e=>{
      const opt = e.target.closest(".opt");
      if(!opt) return;
      const meal = MEALS.find(m=>m.key===opt.dataset.meal);
      meal.items.push({foodId:opt.dataset.food, qty:1});
      renderAll();
    });
  });
  document.querySelectorAll('[data-role="customAdd"]').forEach(btn=>{
    btn.addEventListener("click", e=>{
      const card = e.target.closest(".meal-card");
      const nameInp = card.querySelector(".customName");
      const kcalInp = card.querySelector(".customKcal");
      const name = nameInp.value.trim(), kcal = parseFloat(kcalInp.value);
      if(!name || !kcal) return;
      const meal = MEALS.find(m=>m.key===e.target.dataset.meal);
      meal.items.push({custom:true, name, icon:"🍽️", unit:"serving", k:kcal, p:0,c:0,f:0,fb:0, qty:1});
      nameInp.value=""; kcalInp.value="";
      renderAll();
    });
  });
}

function subtotal(items){
  return items.reduce((acc,item)=>{
    const f = item.custom ? item : foodOf(item);
    acc.k += f.k*item.qty; acc.p += (f.p||0)*item.qty; acc.c += (f.c||0)*item.qty;
    acc.f += (f.f||0)*item.qty; acc.fb += (f.fb||0)*item.qty;
    return acc;
  }, {k:0,p:0,c:0,f:0,fb:0});
}

const RING_COLORS = {Calories:"var(--blue)", Protein:"var(--green)", Carbs:"var(--orange)", Fat:"var(--purple)", Fiber:"var(--red)"};
function renderRings(t, target, proteinGoal, carbGoal, fatGoal, fiberGoal){
  const data = [
    {label:"Calories", val:t.k, goal:target, emoji:"🔥"},
    {label:"Protein", val:t.p, goal:proteinGoal, emoji:"🥩"},
    {label:"Carbs", val:t.c, goal:carbGoal, emoji:"🍚"},
    {label:"Fat", val:t.f, goal:fatGoal, emoji:"🥑"},
    {label:"Fiber", val:t.fb, goal:fiberGoal, emoji:"🥗"},
  ];
  const wrap = document.getElementById("ringsWrap");
  const R = 40, C = 2*Math.PI*R;
  wrap.innerHTML = data.map((d,i)=>{
    const pct = Math.max(0,Math.min(1, d.val/d.goal));
    const offset = C*(1-pct);
    return `<div class="ring-card glass" style="animation-delay:${i*0.06}s">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="${R}"></circle>
        <circle class="fill" cx="50" cy="50" r="${R}" stroke="${RING_COLORS[d.label]}"
          stroke-dasharray="${C}" stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="ringval">${d.emoji} ${Math.round(d.val)}<small>/ ${Math.round(d.goal)} ${d.label==="Calories"?"kcal":"g"}</small></div>
      <div class="lbl">${d.label}</div>
    </div>`;
  }).join("");
}

function renderSticky(){
  const {target, weight} = computeTarget();
  const all = MEALS.flatMap(m=>m.items);
  const t = subtotal(all);
  const proteinGoal = Math.round(weight*1.2);
  const fiberGoal = 30;
  const fatGoal = Math.round(target*0.25/9);
  const carbGoal = Math.max(50, Math.round((target - proteinGoal*4 - fatGoal*9)/4));

  document.getElementById("navCal").innerHTML = `🔥 <b>${Math.round(t.k)}</b> / ${target} kcal`;

  const macros = [
    {label:"Cal", val:t.k, goal:target, color:"var(--blue)"},
    {label:"Prot", val:t.p, goal:proteinGoal, color:"var(--green)"},
    {label:"Carb", val:t.c, goal:carbGoal, color:"var(--orange)"},
    {label:"Fat", val:t.f, goal:fatGoal, color:"var(--purple)"},
    {label:"Fiber", val:t.fb, goal:fiberGoal, color:"var(--red)"},
  ];
  document.getElementById("stickyBar").innerHTML = macros.map(m=>{
    const pct = Math.min(100, (m.val/m.goal)*100);
    return `<div class="mac-mini">
      <div class="top"><span>${m.label}</span><span>${Math.round(m.val)}/${Math.round(m.goal)}</span></div>
      <div class="track"><div class="fill" style="width:${pct}%; background:${m.color}"></div></div>
    </div>`;
  }).join("");

  renderRings(t, target, proteinGoal, carbGoal, fatGoal, fiberGoal);
  renderSuggestions(t, target, proteinGoal, fiberGoal);
}

function renderSuggestions(t, target, proteinGoal, fiberGoal){
  const box = document.getElementById("suggestBody");
  const tips = [];
  if(t.p < proteinGoal*0.8) tips.push("Protein is a bit low — add Paneer, Soy Chunks, Dal, Greek Yogurt or Sprouts.");
  if(t.fb < fiberGoal*0.7) tips.push("Fiber is low — add a fruit, extra vegetables, or a salad.");
  if(t.k > target + 100) tips.push(`You're ${Math.round(t.k-target)} kcal over target — consider trimming rice, sugar, or fried items.`);
  if(t.k < target - 400) tips.push("You're well under target — make sure you're eating enough, especially protein and vegetables.");
  if(t.f*9 > target*0.35) tips.push("Fat intake is on the higher side relative to target — go easy on ghee, fried snacks or extra paneer.");
  box.innerHTML = tips.length
    ? `<ul>${tips.map(x=>`<li>${x}</li>`).join("")}</ul>`
    : `<div class="ok">✓ Nicely balanced — protein, fiber and calories are all in good range.</div>`;
}

function renderAll(){ renderMeals(); renderSticky(); }

/* ---------- Profile listeners ---------- */
document.querySelectorAll("#p_height,#p_weight,#p_age,#p_sex,#p_activity,#p_rate").forEach(el=>{
  el.addEventListener("input", renderSticky);
  el.addEventListener("change", renderSticky);
});

/* ---------- Reset ---------- */
document.getElementById("resetBtn").addEventListener("click", ()=>{
  MEALS = freshMeals();
  renderAll();
  showToast("Reset to default diet");
});

/* ---------- Theme ---------- */
document.getElementById("themeBtn").addEventListener("click", ()=>{
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme")==="dark";
  html.setAttribute("data-theme", isDark?"light":"dark");
  document.getElementById("themeBtn").textContent = isDark ? "🌙" : "☀️";
});

/* ---------- Toast / undo ---------- */
let toastTimer;
function showToast(msg){
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 5000);
}
document.getElementById("undoBtn").addEventListener("click", ()=>{
  if(!lastRemoved) return;
  const meal = MEALS.find(m=>m.key===lastRemoved.mealKey);
  meal.items.splice(lastRemoved.index, 0, lastRemoved.item);
  lastRemoved = null;
  document.getElementById("toast").classList.remove("show");
  renderAll();
});

renderAll();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NutriGlass Pro - Diet & Calorie Tracker</title>
<!-- html2pdf library to capture absolute match of application's glassmorphism UI -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --blue: #0A84FF; --green: #30D158; --orange: #FF9F0A; --red: #FF453A; --purple: #BF5AF2;
  --ink: #1C1C1E; --ink-soft: #8A8A8E; --ink-faint: #B8B8BD;
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-bg-strong: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(255, 255, 255, 0.65);
  --page-bg-1: #EEF3FF; --page-bg-2: #F7F3FF; --page-bg-3: #FFFFFF;
  --shadow: 0 8px 32px rgba(31,38,68,.08);
  --shadow-lift: 0 16px 40px rgba(31,38,68,.14);
}
[data-theme="dark"] {
  --ink: #F2F2F7; --ink-soft: #8E8E93; --ink-faint: #5C5C60;
  --glass-bg: rgba(30, 30, 36, 0.55);
  --glass-bg-strong: rgba(34, 34, 40, 0.85);
  --glass-border: rgba(255, 255, 255, 0.09);
  --page-bg-1: #0B0B10; --page-bg-2: #121018; --page-bg-3: #0D0D12;
  --shadow: 0 8px 32px rgba(0,0,0,.4);
  --shadow-lift: 0 20px 50px rgba(0,0,0,.5);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; font-family: 'Inter', sans-serif; color: var(--ink);
  background:
    radial-gradient(700px 500px at 8% -5%, color-mix(in srgb, var(--blue) 16%, transparent), transparent 60%),
    radial-gradient(600px 500px at 100% 0%, color-mix(in srgb, var(--purple) 14%, transparent), transparent 60%),
    linear-gradient(180deg, var(--page-bg-1), var(--page-bg-2) 45%, var(--page-bg-3));
  min-height: 100%; padding-bottom: 110px; transition: background .3s;
}
.blob { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: .35; }
.blob1 { width: 340px; height: 340px; background: var(--blue); top: -120px; left: -100px; }
.blob2 { width: 300px; height: 300px; background: var(--purple); bottom: 5%; right: -100px; }

.glass {
  background: var(--glass-bg); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--glass-border); border-radius: 26px; box-shadow: var(--shadow);
  transition: transform .25s ease, box-shadow .25s ease, z-index .25s;
}

nav.floatnav {
  position: sticky; top: 14px; z-index: 100; margin: 14px auto 24px; max-width: 920px;
  display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-radius: 22px;
}
.logo { font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 8px; }
.logo .dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple)); }
.nav-spacer { flex: 1; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--glass-border);
  background: var(--glass-bg-strong); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; transition: transform .15s, background .15s; color: var(--ink);
}
.icon-btn:hover { transform: translateY(-2px); }
.icon-btn:active { transform: scale(.92); }

.wrap { max-width: 920px; margin: 0 auto; padding: 0 18px; }

/* ---- Today summary ---- */
.today-card { padding: 28px 30px; margin-bottom: 20px; text-align: center; position: relative; z-index: 20; }
.today-card .kcal-big { font-size: 44px; font-weight: 800; letter-spacing: -.02em; }
.today-card .kcal-big small { font-size: 18px; font-weight: 600; color: var(--ink-soft); }
.today-track { height: 8px; border-radius: 6px; background: var(--glass-border); margin: 16px auto 12px; max-width: 420px; overflow: hidden; }
.today-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .5s ease, background .3s ease; }
.today-meta { display: flex; justify-content: center; gap: 28px; font-size: 13px; color: var(--ink-soft); flex-wrap: wrap; }
.today-meta b { color: var(--ink); font-weight: 700; }

.today-actions { display: flex; justify-content: center; gap: 12px; margin-top: 18px; }
.btn-primary {
  border: none; background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff;
  padding: 12px 24px; border-radius: 16px; font-size: 13.5px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(10, 132, 255, 0.25); transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10, 132, 255, 0.35); }

/* Alcohol Warning Summary */
.alcohol-alert-box {
  margin-top: 16px; padding: 14px 18px; border-radius: 16px; font-size: 12.5px; line-height: 1.5;
  background: rgba(255, 159, 10, 0.12); border: 1px solid rgba(255, 159, 10, 0.3); text-align: left;
  display: none; animation: fadeUp .3s ease both; color: var(--ink);
}
.alcohol-alert-box.visible { display: block; }
.alcohol-alert-title { font-weight: 700; color: var(--orange); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

/* Profile Configuration Board */
.settings { margin-bottom: 20px; position: relative; z-index: 30; padding: 18px; }
.settings h3 { margin: 0 0 14px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.profile-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
@media(max-width:760px){ .profile-grid { grid-template-columns: repeat(2, 1fr); } }
.profile-grid label { font-size: 10px; color: var(--ink-soft); display: block; margin-bottom: 4px; font-weight: 600; }
.profile-grid input, .profile-grid select {
  width: 100%; padding: 7px 9px; border-radius: 10px; border: 1px solid var(--glass-border);
  background: var(--glass-bg-strong); color: var(--ink); font-size: 12px; font-family: inherit;
}

/* ---- Nutrition Summary (Progress Bars instead of rings) ---- */
.nutrition-panel { padding: 24px; margin-bottom: 20px; display: block; }
.macro-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px 28px; }
@media(max-width: 600px) { .macro-grid { grid-template-columns: 1fr; gap: 14px; } }
.macro-row { display: flex; flex-direction: column; gap: 8px; }
.macro-header { display: flex; justify-content: space-between; align-items: flex-end; font-size: 13.5px; font-weight: 700; }
.macro-label { display: flex; align-items: center; gap: 6px; color: var(--ink-soft); }
.macro-val { color: var(--ink); }
.macro-val small { color: var(--ink-faint); font-weight: 600; font-size: 11px; }
.macro-track { height: 8px; border-radius: 6px; background: var(--glass-border); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
.macro-fill { height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease; }

.nutrition-tips { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--glass-border); }
.nutrition-tips h4 { margin: 0 0 8px; font-size: 13px; font-weight: 700; }
.nutrition-tips ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--ink-soft); line-height: 1.8; }
.nutrition-tips .ok { color: var(--green); font-size: 13px; font-weight: 600; }

/* ---- Meal Cards ---- */
.meals { display: flex; flex-direction: column; gap: 16px; position: relative; }
.meal-card { padding: 22px 24px; position: relative; transition: z-index 0.1s ease; }
.meal-card.dropdown-active { z-index: 90 !important; }
.meal-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
.meal-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
.meal-title .emoji { font-size: 21px; }
.meal-kcal { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
.meal-sep { height: 1px; background: var(--glass-border); margin: 14px 0 12px; }

.food-list { display: flex; flex-direction: column; }
.food-row {
  display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--glass-border);
  animation: rowIn .25s ease both; flex-wrap: wrap;
}
@media (max-width: 480px) {
  .food-row { gap: 8px; }
}
.food-row:last-child { border-bottom: none; }
.food-row .icon { font-size: 18px; width: 22px; text-align: center; }
.food-row .name-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 140px; }
.food-row .name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.food-row .subtext { font-size: 11px; color: var(--ink-soft); }

.badge { font-size: 9.5px; padding: 2px 6px; border-radius: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; display: inline-flex; align-items: center; }
.badge.healthy { background: rgba(48, 209, 88, 0.15); color: #30D158; }
.badge.moderate { background: rgba(255, 159, 10, 0.15); color: #FF9F0A; }
.badge.indulgent { background: rgba(255, 69, 58, 0.15); color: #FF453A; }
.badge.alcohol { background: rgba(191, 90, 242, 0.15); color: #BF5AF2; }

.food-row .qty-wrap { display: flex; align-items: center; gap: 4px; }
.food-row .qty {
  width: 52px; text-align: center; border: 1px solid var(--glass-border); background: var(--glass-bg-strong); border-radius: 8px;
  font-size: 12px; color: var(--ink); padding: 4px 0; font-family: inherit; font-weight: 600;
}
.food-row .portion-select {
  padding: 4px 6px; border-radius: 8px; border: 1px solid var(--glass-border);
  background: var(--glass-bg-strong); color: var(--ink); font-size: 12px; font-family: inherit; font-weight: 500;
}
.food-row .kc { font-size: 13px; color: var(--ink-soft); min-width: 48px; text-align: right; font-weight: 600; }
.food-row .x { border: none; background: none; color: var(--ink-faint); cursor: pointer; font-size: 16px; padding: 2px; }
.food-row .x:hover { color: var(--red); }
.empty-note { font-size: 13px; color: var(--ink-faint); padding: 10px 4px; }

.meal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
.link-btn { background: none; border: none; color: var(--blue); font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 0; }
.link-btn.muted { color: var(--ink-faint); }
.link-btn:hover { text-decoration: underline; }

/* ---- Add Food Panel & Dropdown Stacking Fix ---- */
.add-panel { margin-top: 12px; display: none; position: relative; }
.add-panel.open { display: block; animation: fadeUp .25s ease both; }
.search-wrap { position: relative; width: 100%; }
.search-wrap input {
  width: 100%; padding: 10px 14px; border-radius: 14px; border: 1px solid var(--glass-border);
  background: var(--glass-bg-strong); color: var(--ink); font-size: 13.5px; font-family: inherit;
}
.search-wrap input:focus {
  outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
}

.dropdown {
  position: absolute; left: 0; right: 0; z-index: 1000; max-height: 280px; overflow-y: auto;
  border-radius: 14px; padding: 6px; background: var(--glass-bg-strong); backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%); border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-lift); margin-top: 6px;
}
.dropdown.open-upward {
  bottom: 44px; top: auto; margin-top: 0; margin-bottom: 6px;
}
.dropdown .dropdown-section-title {
  font-size: 9px; font-weight: 800; color: var(--ink-faint); text-transform: uppercase;
  padding: 6px 10px 3px; letter-spacing: 0.05em; border-top: 1px solid rgba(255,255,255,0.05);
}
.dropdown .dropdown-section-title:first-child { border-top: none; }
.dropdown .opt {
  padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: background .1s;
}
.dropdown .opt:hover { background: color-mix(in srgb, var(--blue) 12%, transparent); }
.dropdown .opt-meta { display: flex; align-items: center; gap: 6px; }
.dropdown .empty { padding: 12px 10px; font-size: 12.5px; color: var(--ink-soft); text-align: center; }
.custom-toggle { padding: 9px 10px; font-size: 12px; color: var(--blue); cursor: pointer; font-weight: 600; border-top: 1px dashed var(--glass-border); }
.custom-form { display: none; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.custom-form.open { display: flex; }
.custom-form input {
  flex: 1; min-width: 80px; padding: 8px 10px; border-radius: 10px; border: 1px dashed var(--glass-border);
  background: transparent; color: var(--ink); font-size: 12px; font-family: inherit;
}
.custom-form button {
  border: none; background: var(--blue); color: #fff; border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
}

/* Modal Overlay & Card design */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeUp 0.2s ease both;
}
.modal-card {
  max-width: 480px; width: 92%; padding: 28px; border-radius: 26px;
  box-shadow: var(--shadow-lift); text-align: left;
}
.modal-title { margin-top: 0; font-size: 18px; font-weight: 800; margin-bottom: 14px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 11px; font-weight: 700; color: var(--ink-soft); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.modal-field input, .modal-field textarea, .modal-field select {
  width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--glass-bg-strong); color: var(--ink); font-size: 13px; font-family: inherit;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.modal-btn {
  border: none; padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer;
}
.modal-btn.cancel { background: var(--glass-border); color: var(--ink); }
.modal-btn.confirm { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes rowIn { from { opacity: 0; } to { opacity: 1; } }

.fab {
  position: fixed; bottom: 22px; right: 22px; z-index: 60; width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; font-size: 26px; border: none;
  box-shadow: var(--shadow-lift); cursor: pointer; display: none; align-items: center; justify-content: center;
}
@media(max-width:600px){ .fab { display: flex; } }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); z-index: 2000;
  padding: 10px 18px; border-radius: 20px; font-size: 12px; display: flex; gap: 12px; align-items: center;
  opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s;
  background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; box-shadow: var(--shadow-lift);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.toast button { background: none; border: none; color: #fff; text-decoration: underline; cursor: pointer; font-size: 12px; font-weight: 700; }

@media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav class="floatnav glass">
  <div class="logo"><span class="dot"></span>NutriGlass Pro</div>
  <div class="nav-spacer"></div>
  <button class="icon-btn" id="resetBtn" title="Reset to default diet" style="margin-right: 8px;">↺</button>
  <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap" id="mainWrap">

  <div class="today-card glass" id="todayCard">
    <div class="kcal-big" id="todayKcal">-- <small>/ -- kcal</small></div>
    <div class="today-track"><div class="today-fill" id="todayFill"></div></div>
    <div class="today-meta">
      <span>Remaining <b id="remainKcal">--</b></span>
      <span>Weight goal <b id="weightGoal">--</b></span>
    </div>
    
    <!-- Dynamic Alcohol Information Banner -->
    <div class="alcohol-alert-box" id="alcoholAlert">
      <div class="alcohol-alert-title">🍺 Alcohol Intake Warning</div>
      <div id="alcoholAlertContent"></div>
    </div>

    <!-- Chart Action Area -->
    <div class="today-actions">
      <button class="btn-primary" id="triggerDownload">📥 Download Diet Chart</button>
    </div>
  </div>

  <!-- VIEW NUTRITION (Positioned right below todayCard, always open) -->
  <div class="nutrition-panel glass" id="nutritionPanel">
    <div class="macro-grid" id="ringsWrap"></div>
    <div class="nutrition-tips">
      <h4>Suggestions</h4>
      <div id="suggestBody"></div>
    </div>
  </div>

  <!-- Profile configuration - fully visible directly -->
  <div class="settings glass">
    <h3>⚙️ Profile & Target Configurations</h3>
    <div class="profile-grid">
      <div><label>Height (cm)</label><input type="number" id="p_height" value="172"></div>
      <div><label>Weight (kg)</label><input type="number" id="p_weight" value="79"></div>
      <div><label>Age</label><input type="number" id="p_age" value="40"></div>
      <div><label>Sex</label>
        <select id="p_sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div><label>Activity Level</label>
        <select id="p_activity">
          <option value="1.2" selected>Sedentary (< 5k steps • Little/No exercise)</option>
          <option value="1.375">Lightly active (5k - 7.5k steps • +200-400 kcal)</option>
          <option value="1.55">Moderately active (7.5k - 10k steps • +400-700 kcal)</option>
          <option value="1.725">Very active (> 10k steps • +700 - 1000+ kcal)</option>
        </select>
      </div>
      <div><label>Weekly loss</label>
        <select id="p_rate">
          <option value="0.5" selected>0.5 kg/wk</option>
          <option value="0.75">0.75 kg/wk</option>
          <option value="1">1 kg/wk</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Meal listing -->
  <div class="meals" id="mealsWrap"></div>

</div>

<!-- PDF Download Custom Confirmation/Notes Modal -->
<div class="modal-overlay" id="downloadModal" style="display: none;">
  <div class="modal-card glass">
    <div class="modal-title">📥 Download Diet Chart PDF</div>
    
    <div class="modal-field">
      <label>Full Name</label>
      <input type="text" id="pdf_user_name" value="Rahul" placeholder="Enter your name">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="modal-field">
        <label>Height (cm)</label>
        <input type="number" id="modal_height" value="172">
      </div>
      <div class="modal-field">
        <label>Weight (kg)</label>
        <input type="number" id="modal_weight" value="79">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="modal-field">
        <label>Age</label>
        <input type="number" id="modal_age" value="40">
      </div>
      <div class="modal-field">
        <label>Sex</label>
        <select id="modal_sex">
          <option value="male" selected>Male</option>
          <option value="female">Female</option>
        </select>
      </div>
    </div>

    <div class="modal-field">
      <label>Custom Goal / Advisory Notes</label>
      <textarea id="pdf_custom_notes" placeholder="e.g. Target: Fat Loss, High Protein Vegetarian diet. No processed food." rows="3"></textarea>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" id="cancelDownload">Cancel</button>
      <button class="modal-btn confirm" id="confirmDownload">Generate PDF</button>
    </div>
  </div>
</div>

<button class="fab" title="Add food">+</button>
<div class="toast" id="toast"><span id="toastMsg"></span><button id="undoBtn">Undo</button></div>

<script>

  k: r[4],
  p: r[5],
  c: r[6],
  f: r[7],
  fb: r[8],
  health: r[9],
  keywords: r[10] || []
}));

function byName(n){ return FOODS.find(f=>f.name===n); }

    { foodId: byName("Tea with Sugar").id, qty: 1 },

  ],

const MEAL_META = [
  { key: "breakfast", label: "Breakfast", emoji: "🍳" },
  { key: "lunch", label: "Lunch", emoji: "🍛" },
  { key: "evening", label: "Evening Snack", emoji: "☕" },
  { key: "dinner", label: "Dinner", emoji: "🌙" },
];

function freshMeals() {
  return MEAL_META.map(m => ({
    ...m,
    items: DEFAULT_MEAL_PLAN[m.key].map(i => ({
      ...i,
      portionIndex: i.portionIndex !== undefined ? i.portionIndex : -1
    }))
  }));
}

let MEALS = freshMeals();
let openAddPanel = null;
let lastRemoved = null;

function foodOf(item){ return FOODS.find(f=>f.id===item.foodId); }

function computeTarget() {
  const h = +document.getElementById("p_height").value,
        w = +document.getElementById("p_weight").value,
        a = +document.getElementById("p_age").value,
        sex = document.getElementById("p_sex").value,
        act = +document.getElementById("p_activity").value,
        rate = +document.getElementById("p_rate").value;
  const bmr = sex==="male" ? (10*w+6.25*h-5*a+5) : (10*w+6.25*h-5*a-161);
  const target = Math.round(bmr*act - rate*1100);
  return { target, weight: w, rate };
}

function subtotal(items) {
  return items.reduce((acc, item) => {
    const f = item.custom ? item : foodOf(item);
    if (!f) return acc;
    
    let factor = 1.0;
    const config = PORTIONS_CONFIG[f.name];
    if (config && item.portionIndex !== undefined && item.portionIndex >= 0) {
      factor = config[item.portionIndex].factor;
    }

    const multiplier = item.qty * factor;
    acc.k += f.k * multiplier;
    acc.p += (f.p||0) * multiplier;
    acc.c += (f.c||0) * multiplier;
    acc.f += (f.f||0) * multiplier;
    acc.fb += (f.fb||0) * multiplier;
    
    if (f.cat === "Alcohol") {
      acc.alk += f.k * multiplier;
    }
    return acc;
  }, { k: 0, p: 0, c: 0, f: 0, fb: 0, alk: 0 });
}

function getHealthBadge(health) {
  if (health === "healthy") return `<span class="badge healthy">🟢 Healthy</span>`;
  if (health === "moderate") return `<span class="badge moderate">🟡 Moderate</span>`;
  if (health === "indulgent") return `<span class="badge indulgent">🔴 High Calorie</span>`;
  if (health === "alcohol") return `<span class="badge alcohol">🍷 Alcohol</span>`;
  return '';
}

/* ---------- STREAMING_CHUNK: Rendering meal cards ---------- */
function renderMeals() {
  const wrap = document.getElementById("mealsWrap");
  wrap.innerHTML = "";
  
  MEALS.forEach((meal, mi) => {
    const sub = subtotal(meal.items);
    const card = document.createElement("div");
    const isOpen = openAddPanel === meal.key;
    
    card.className = `meal-card glass ${isOpen ? 'dropdown-active' : ''}`;
    card.style.animationDelay = (mi * 0.05) + "s";
    card.id = `meal-${meal.key}`;
    
    card.innerHTML = `
      <div class="meal-head">
        <div class="meal-title"><span class="emoji">${meal.emoji}</span>${meal.label}</div>
        <span class="meal-kcal">${Math.round(sub.k)} kcal</span>
      </div>
      <div class="meal-sep"></div>
      <div class="food-list" data-meal="${meal.key}">
        ${meal.items.length ? "" : `<div class="empty-note">No foods added yet.</div>`}
      </div>
      <div class="meal-actions">
        <button class="link-btn" data-role="toggleAdd" data-meal="${meal.key}">${isOpen ? '✕ Close Search' : '+ Add food'}</button>
        <button class="link-btn muted" data-role="clear" data-meal="${meal.key}">Clear meal</button>
      </div>
      <div class="add-panel ${isOpen ? 'open' : ''}" data-meal="${meal.key}">
        <div class="search-wrap">
          <input type="text" placeholder="Type to search (e.g., chick, beer, whis, apple)" data-meal="${meal.key}" class="searchInput" autocomplete="off">
          <div class="dropdown" style="display:none;" data-meal="${meal.key}"></div>
        </div>
        <div class="custom-form" data-meal="${meal.key}">
          <input type="text" placeholder="Custom food name" class="customName">
          <input type="number" placeholder="kcal" style="max-width:70px" class="customKcal">
          <button data-meal="${meal.key}" data-role="customSave">Add Custom</button>
        </div>
      </div>
    `;
    wrap.appendChild(card);

    const foodList = card.querySelector(".food-list");
    meal.items.forEach((item, idx) => {
      const f = item.custom ? item : foodOf(item);
      if (!f) return;
      
      const hasPortions = PORTIONS_CONFIG[f.name] !== undefined;
      let factor = 1.0;
      let portionDropdownHTML = '';
      
      if (hasPortions) {
        const configs = PORTIONS_CONFIG[f.name];
        portionDropdownHTML = `<select class="portion-select" data-meal="${meal.key}" data-idx="${idx}" title="Select portion">`;
        configs.forEach((cfg, cIdx) => {
          const selected = item.portionIndex === cIdx ? 'selected' : '';
          portionDropdownHTML += `<option value="${cIdx}" ${selected}>${cfg.label}</option>`;
          if (item.portionIndex === cIdx) {
            factor = cfg.factor;
          }
        });
        portionDropdownHTML += `</select>`;
      }

      const totalKcal = f.k * item.qty * factor;
      const unitLabel = f.custom ? (f.unit || 'serving') : f.unit;
      
      const row = document.createElement("div");
      row.className = "food-row";
      row.innerHTML = `
        <span class="icon">${f.icon || "🍽️"}</span>
        <div class="name-wrap">
          <span class="name">
            ${f.name} 
            ${getHealthBadge(f.health)}
          </span>
          <span class="subtext">${f.cat} • Base: ${f.k} kcal / ${unitLabel}</span>
        </div>
        <div class="qty-wrap">
          <input type="number" min="0" step="0.25" value="${item.qty}" data-meal="${meal.key}" data-idx="${idx}" class="qty" title="Quantity multiplier">
          ${portionDropdownHTML}
        </div>
        <span class="kc">${Math.round(totalKcal)} kcal</span>
        <button class="x" data-meal="${meal.key}" data-idx="${idx}">×</button>
      `;
      foodList.appendChild(row);
    });
  });

  /* Quantity and portion events */
  document.querySelectorAll(".qty").forEach(inp => {
    inp.addEventListener("change", e => {
      const meal = MEALS.find(m => m.key === e.target.dataset.meal);
      meal.items[+e.target.dataset.idx].qty = parseFloat(e.target.value) || 0;
      renderAll();
    });
  });

  document.querySelectorAll(".portion-select").forEach(sel => {
    sel.addEventListener("change", e => {
      const meal = MEALS.find(m => m.key === e.target.dataset.meal);
      meal.items[+e.target.dataset.idx].portionIndex = parseInt(e.target.value);
      renderAll();
    });
  });

  document.querySelectorAll(".food-row .x").forEach(btn => {
    btn.addEventListener("click", e => {
      const meal = MEALS.find(m => m.key === e.target.dataset.meal);
      const idx = +e.target.dataset.idx;
      lastRemoved = { mealKey: meal.key, item: { ...meal.items[idx] }, index: idx };
      const name = lastRemoved.item.custom ? lastRemoved.item.name : foodOf(lastRemoved.item).name;
      meal.items.splice(idx, 1);
      showToast(`Removed "${name}"`);
      renderAll();
    });
  });

  document.querySelectorAll('[data-role="clear"]').forEach(btn => {
    btn.addEventListener("click", e => {
      const meal = MEALS.find(m => m.key === e.target.dataset.meal);
      meal.items = [];
      renderAll();
    });
  });

  document.querySelectorAll('[data-role="toggleAdd"]').forEach(btn => {
    btn.addEventListener("click", e => {
      const mk = e.target.dataset.meal;
      openAddPanel = openAddPanel === mk ? null : mk;
      renderAll();
      if (openAddPanel) {
        setTimeout(() => {
          const inp = document.querySelector(`.searchInput[data-meal="${mk}"]`);
          if (inp) inp.focus();
        }, 30);
      }
    });
  });

  /* Autocomplete search dropdown overlay */
  document.querySelectorAll(".searchInput").forEach(inp => {
    inp.addEventListener("input", e => {
      const mk = e.target.dataset.meal;
      const dd = document.querySelector(`.dropdown[data-meal="${mk}"]`);
      const q = e.target.value.trim().toLowerCase();
      
      if (!q) { 
        dd.style.display = "none"; 
        return; 
      }
      
      const rect = inp.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      if (spaceBelow < 260) {
        dd.classList.add("open-upward");
      } else {
        dd.classList.remove("open-upward");
      }

      const matches = FOODS.filter(f => {
        const matchesName = f.name.toLowerCase().includes(q);
        const matchesCat = f.cat.toLowerCase().includes(q);
        const matchesKw = f.keywords && f.keywords.some(k => k.includes(q));
        return matchesName || matchesCat || matchesKw;
      }).slice(0, 15);

      if (matches.length) {
        let sections = {};
        matches.forEach(f => {
          if (!sections[f.cat]) sections[f.cat] = [];
          sections[f.cat].push(f);
        });

        let listHTML = '';
        for (const cat in sections) {
          listHTML += `<div class="dropdown-section-title">${cat}</div>`;
          sections[cat].forEach(f => {
            const badge = getHealthBadge(f.health);
            listHTML += `
              <div class="opt" data-meal="${mk}" data-food="${f.id}">
                <span>${f.icon} <b>${f.name}</b> ${badge}</span>
                <span class="opt-meta">
                  <span style="font-size: 11px; color: var(--ink-faint);">${f.k} kcal / ${f.unit}</span>
                </span>
              </div>`;
          });
        }
        
        dd.innerHTML = listHTML + `<div class="custom-toggle" data-meal="${mk}">+ Create custom item for "${e.target.value.trim()}"</div>`;
      } else {
        dd.innerHTML = `<div class="empty">No exact matches found</div>` + 
                       `<div class="custom-toggle" data-meal="${mk}">+ Create custom item for "${e.target.value.trim()}"</div>`;
      }
      dd.style.display = "block";
    });

    inp.addEventListener("blur", () => {
      setTimeout(() => {
        document.querySelectorAll(".dropdown").forEach(d => d.style.display = "none");
      }, 220);
    });
  });

  document.querySelectorAll(".dropdown").forEach(dd => {
    dd.addEventListener("mousedown", e => {
      const opt = e.target.closest(".opt");
      const custom = e.target.closest(".custom-toggle");
      
      if (opt) {
        const meal = MEALS.find(m => m.key === opt.dataset.meal);
        const foodItem = FOODS.find(f => f.id === opt.dataset.food);
        
        const hasPortions = PORTIONS_CONFIG[foodItem.name] !== undefined;
        meal.items.push({
          foodId: opt.dataset.food,
          qty: 1,
          portionIndex: hasPortions ? 0 : -1
        });
        
        openAddPanel = null;
        renderAll();
      } else if (custom) {
        const mk = custom.dataset.meal;
        const form = document.querySelector(`.custom-form[data-meal="${mk}"]`);
        form.classList.add("open");
        form.querySelector(".customName").value = document.querySelector(`.searchInput[data-meal="${mk}"]`).value;
      }
    });
  });

  document.querySelectorAll('[data-role="customSave"]').forEach(btn => {
    btn.addEventListener("click", e => {
      const mk = e.target.dataset.meal;
      const form = e.target.closest(".custom-form");
      const name = form.querySelector(".customName").value.trim();
      const kcal = parseFloat(form.querySelector(".customKcal").value);
      if (!name || isNaN(kcal)) return;
      
      const meal = MEALS.find(m => m.key === mk);
      meal.items.push({
        custom: true,
        name,
        icon: "🍽️",
        unit: "serving",
        k: kcal,
        p: 0, c: 0, f: 0, fb: 0,
        qty: 1,
        portionIndex: -1
      });
      openAddPanel = null;
      renderAll();
    });
  });
}

/* ---------- STREAMING_CHUNK: Calculations and macro rings rendering ---------- */
function renderRings(t, target, proteinGoal, carbGoal, fatGoal, fiberGoal) {
  const data = [
    { label: "Calories", val: t.k, goal: target, emoji: "🔥" },
    { label: "Protein", val: t.p, goal: proteinGoal, emoji: "🥩" },
    { label: "Carbs", val: t.c, goal: carbGoal, emoji: "🍚" },
    { label: "Fat", val: t.f, goal: fatGoal, emoji: "🥑" },
    { label: "Fiber", val: t.fb, goal: fiberGoal, emoji: "🥗" },
  ];
  
  document.getElementById("ringsWrap").innerHTML = data.map((d) => {
    const pct = Math.max(0, Math.min(100, (d.val / d.goal) * 100));
    const color = RING_COLORS[d.label];
    const unit = d.label === "Calories" ? "" : "g";
    
    return `
      <div class="macro-row">
        <div class="macro-header">
          <span class="macro-label">${d.emoji} ${d.label}</span>
          <span class="macro-val">${Math.round(d.val)}<small> / ${Math.round(d.goal)}${unit}</small></span>
        </div>
        <div class="macro-track">
          <div class="macro-fill" style="width: ${pct}%; background: ${color};"></div>
        </div>
      </div>
    `;
  }).join("");
}

function renderSuggestions(t, target, proteinGoal, fiberGoal) {
  const tips = [];
  if (t.p < proteinGoal * 0.8) tips.push("Protein intake is on the lower side — include Sprouts, Paneer, Tofu, Greek Yogurt, or Moong Dal.");
  if (t.fb < fiberGoal * 0.7) tips.push("Fiber is low — try adding extra green salad, cucumbers, papaya, or apples to your meals.");
  if (t.k > target + 100) tips.push(`You are ${Math.round(t.k-target)} kcal over your budget limit. Trimming sugary tea or extra chapatis will help keep you on track.`);
  if (t.k < target - 400) tips.push("You're well under your target budget. Ensure you're meeting your recovery requirements with healthy options.");
  
  if (t.alk > 0) {
    tips.push("⚠️ Alcohol consumed: Remember, alcohol calories are nutrient-empty. Prioritize drinking extra water to counter dehydration.");
  }

  document.getElementById("suggestBody").innerHTML = tips.length
    ? `<ul>${tips.map(x => `<li>${x}</li>`).join("")}</ul>`
    : `<div class="ok">✓ Beautifully balanced! Your protein, fiber, and calorie targets are matching up perfectly today.</div>`;
}

function renderTop() {
  const { target, weight, rate } = computeTarget();
  const t = subtotal(MEALS.flatMap(m => m.items));
  const remaining = Math.max(0, target - Math.round(t.k));
  const intake = Math.round(t.k);
  
  /* Color warning logic requested by user:
     - RED: Over calorie (Target + 100 kcal)
     - GREEN: Target Sweet Spot (Target - 200 up to Target + 100)
     - YELLOW/ORANGE: Deficit Warnings (More than 200 kcal below target)
  */
  let stateColor = "var(--green)";
  if (intake > (target + 100)) {
    stateColor = "var(--red)";
  } else if (intake >= (target - 200)) {
    stateColor = "var(--green)";
  } else {
    stateColor = "var(--orange)";
  }

  const kcalEl = document.getElementById("todayKcal");
  kcalEl.innerHTML = `<span style="color: ${stateColor}; transition: color 0.3s ease;">${intake}</span> <small>/ ${target} kcal</small>`;
  
  const fillEl = document.getElementById("todayFill");
  fillEl.style.width = Math.min(100, (intake / target) * 100) + "%";
  fillEl.style.background = stateColor;
  
  document.getElementById("remainKcal").textContent = remaining + " kcal";
  document.getElementById("weightGoal").textContent = "-" + rate + " kg/wk";

  const proteinGoal = Math.round(weight * 1.5); 
  const fiberGoal = 30; 
  const fatGoal = Math.round(target * 0.25 / 9);
  const carbGoal = Math.max(50, Math.round((target - proteinGoal * 4 - fatGoal * 9) / 4));
  
  const alertBox = document.getElementById("alcoholAlert");
  const alertContent = document.getElementById("alcoholAlertContent");
  if (t.alk > 0) {
    alertBox.classList.add("visible");
    alertContent.innerHTML = `You have consumed <b>${Math.round(t.alk)} kcal</b> from alcoholic beverages today (<b>${Math.round((t.alk / t.k) * 100)}%</b> of your current intake). <br/>
    <span style="color: var(--ink-soft); font-size: 11px; display: block; margin-top: 6px;">
    <i>Note: Alcohol delivers liquid calories without essential nutrients. It temporarily downregulates fat-burning, slows recovery, and can increase cravings.</i></span>`;
  } else {
    alertBox.classList.remove("visible");
  }

  renderRings(t, target, proteinGoal, carbGoal, fatGoal, fiberGoal);
  renderSuggestions(t, target, proteinGoal, fiberGoal);
}

function renderAll() { 
  renderMeals(); 
  renderTop(); 
}

});

document.querySelector(".fab").addEventListener("click", () => {
  document.getElementById("mealsWrap").scrollIntoView({ behavior: "smooth" });
});

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 5000);
}

document.getElementById("undoBtn").addEventListener("click", () => {
  if (!lastRemoved) return;
  const meal = MEALS.find(m => m.key === lastRemoved.mealKey);
  meal.items.splice(lastRemoved.index, 0, lastRemoved.item);
  lastRemoved = null;
  document.getElementById("toast").classList.remove("show");
  renderAll();
});

// App Initial Startup Run
renderAll();
</script>
</body>
</html>
